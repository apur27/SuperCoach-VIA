<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1260" width="1200" height="1260" role="img" aria-label="SuperCoach VIA - 130 years of AFL data, 13,328 player files, AI-powered predictions, reviewed by a seven-agent AI council. Data timeline 1897 to 2026, prediction accuracy MAE 4.055, council pipeline, and feature summary.">
  <defs>
    <!-- Deep navy night-game gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10182b"/>
      <stop offset="55%" stop-color="#0c1322"/>
      <stop offset="100%" stop-color="#070b15"/>
    </linearGradient>
    <radialGradient id="glow" cx="22%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1c2c4d" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0c1322" stop-opacity="0"/>
    </radialGradient>
    <!-- Subtle title sheen: white core, faint gold edges -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="78%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffe39a"/>
    </linearGradient>
    <!-- Footy-gold accent bar -->
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB300" stop-opacity="0"/>
      <stop offset="14%" stop-color="#FFB300" stop-opacity="1"/>
      <stop offset="86%" stop-color="#FFB300" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient>
    <!-- Slightly lifted band for the council strip -->
    <linearGradient id="stripGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#121b30"/>
      <stop offset="100%" stop-color="#0d1525"/>
    </linearGradient>
    <!-- Band background: lifted a touch above the header for contrast -->
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1829"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="bandGradAlt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1524"/>
      <stop offset="100%" stop-color="#09101d"/>
    </linearGradient>
  </defs>

  <!-- Background (full height) -->
  <rect x="0" y="0" width="1200" height="1260" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="1200" height="420" fill="url(#glow)"/>

  <!-- Faint pitch lines for texture (very low opacity) -->
  <g stroke="#FFB300" stroke-opacity="0.05" stroke-width="1" fill="none">
    <ellipse cx="1040" cy="150" rx="220" ry="150"/>
    <ellipse cx="1040" cy="150" rx="130" ry="88"/>
    <line x1="1040" y1="0" x2="1040" y2="300"/>
  </g>

  <!-- Left gold tick mark -->
  <rect x="64" y="74" width="6" height="62" rx="3" fill="#FFB300"/>

  <!-- Primary title -->
  <text x="92" y="118" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="62" font-weight="800" fill="url(#titleGrad)"
        letter-spacing="-1">SuperCoach VIA</text>

  <!-- Subtitle -->
  <text x="94" y="158" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="22" font-weight="400" fill="#aebbd2"
        letter-spacing="0.3">130 years of AFL data &#183; 13,000+ players &#183; AI-powered predictions</text>

  <!-- Stat callout pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <!-- Pill 1 -->
    <rect x="92" y="196" width="178" height="48" rx="24" fill="#e8eef9"/>
    <text x="181" y="226" text-anchor="middle" font-size="20" font-weight="700" fill="#0c1322">R1&#8211;R12 &#183; 2026</text>
    <!-- Pill 2 -->
    <rect x="286" y="196" width="158" height="48" rx="24" fill="#e8eef9"/>
    <text x="365" y="226" text-anchor="middle" font-size="20" font-weight="700" fill="#0c1322">MAE 4.055</text>
    <!-- Pill 3 -->
    <rect x="460" y="196" width="206" height="48" rx="24" fill="#FFB300"/>
    <text x="563" y="226" text-anchor="middle" font-size="20" font-weight="700" fill="#3a2a00">72.8% within 5</text>
  </g>

  <!-- Right-side mark -->
  <text x="1136" y="150" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="20" font-weight="600" fill="#7f8db0" letter-spacing="2">AFL &#183; SUPERCOACH &#183; DATA</text>

  <!-- ============================================================= -->
  <!-- Second row: seven-agent AI council strip on a lifted band     -->
  <!-- ============================================================= -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <!-- Lifted band -->
    <rect x="0" y="280" width="1200" height="130" fill="url(#stripGrad)"/>
    <line x1="0" y1="280" x2="1200" y2="280" stroke="#FFB300" stroke-opacity="0.18" stroke-width="1"/>

    <!-- Strip section label -->
    <text x="92" y="318" font-size="13" font-weight="700" fill="#7f8db0" letter-spacing="3">THE SEVEN-AGENT AI COUNCIL</text>

    <!-- Agent role chips (muted teal/blue) -->
    <!-- Scientist -->
    <rect x="92"  y="334" width="104" height="34" rx="17" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.5" stroke-width="1"/>
    <text x="144"  y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#bfe4f2">Scientist</text>
    <!-- Gaffer -->
    <rect x="208" y="334" width="92"  height="34" rx="17" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.5" stroke-width="1"/>
    <text x="254" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#bfe4f2">Gaffer</text>
    <!-- FootyStrategy -->
    <rect x="312" y="334" width="146" height="34" rx="17" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.5" stroke-width="1"/>
    <text x="385" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#bfe4f2">FootyStrategy</text>
    <!-- BriefBuilder -->
    <rect x="470" y="334" width="132" height="34" rx="17" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.5" stroke-width="1"/>
    <text x="536" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#bfe4f2">BriefBuilder</text>
    <!-- DataSentinel -->
    <rect x="614" y="334" width="136" height="34" rx="17" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.5" stroke-width="1"/>
    <text x="682" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#bfe4f2">DataSentinel</text>
    <!-- Skeptic -->
    <rect x="762" y="334" width="92"  height="34" rx="17" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.5" stroke-width="1"/>
    <text x="808" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#bfe4f2">Skeptic</text>
    <!-- Codex (external, gold-tinted to mark the outside model) -->
    <rect x="866" y="334" width="90"  height="34" rx="17" fill="#3a2f12" stroke="#FFB300" stroke-opacity="0.5" stroke-width="1"/>
    <text x="911" y="356" text-anchor="middle" font-size="16" font-weight="600" fill="#ffd87a">Codex</text>

    <!-- Tagline strip -->
    <text x="92" y="392" font-size="15" font-weight="500" fill="#8d9bbb" letter-spacing="0.4">Data-grounded &#183; Machine-verified &#183; AI-council reviewed</text>
  </g>

  <!-- ============================================================= -->
  <!-- BAND 1 : Data timeline (y 420 to 560)                         -->
  <!-- ============================================================= -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="0" y="420" width="1200" height="140" fill="url(#bandGrad)"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#1c2c4d" stroke-opacity="0.6" stroke-width="1"/>

    <!-- Section label -->
    <text x="92" y="458" font-size="13" font-weight="700" fill="#7f8db0" letter-spacing="3">AFL DATA COVERAGE</text>

    <!-- Timeline spine -->
    <line x1="92" y1="498" x2="1108" y2="498" stroke="#FFB300" stroke-width="2"/>

    <!-- Ticks + year labels: 1897, 1925, 1950, 1975, 2000, 2026 -->
    <!-- positions linearly mapped across x=92..1108 over years 1897..2026 -->
    <!-- 1897 -> 92 -->
    <line x1="92"   y1="490" x2="92"   y2="506" stroke="#FFB300" stroke-width="2"/>
    <text x="92"   y="528" text-anchor="middle" font-size="15" font-weight="600" fill="#c6d2e6">1897</text>
    <!-- 1925 -> 312.6 -->
    <line x1="313"  y1="490" x2="313"  y2="506" stroke="#FFB300" stroke-width="2"/>
    <text x="313"  y="528" text-anchor="middle" font-size="15" font-weight="600" fill="#c6d2e6">1925</text>
    <!-- 1950 -> 509.6 -->
    <line x1="510"  y1="490" x2="510"  y2="506" stroke="#FFB300" stroke-width="2"/>
    <text x="510"  y="528" text-anchor="middle" font-size="15" font-weight="600" fill="#c6d2e6">1950</text>
    <!-- 1975 -> 706.7 -->
    <line x1="707"  y1="490" x2="707"  y2="506" stroke="#FFB300" stroke-width="2"/>
    <text x="707"  y="528" text-anchor="middle" font-size="15" font-weight="600" fill="#c6d2e6">1975</text>
    <!-- 2000 -> 903.7 -->
    <line x1="904"  y1="490" x2="904"  y2="506" stroke="#FFB300" stroke-width="2"/>
    <text x="904"  y="528" text-anchor="middle" font-size="15" font-weight="600" fill="#c6d2e6">2000</text>
    <!-- 2026 -> 1108 -->
    <line x1="1108" y1="490" x2="1108" y2="506" stroke="#FFB300" stroke-width="2"/>
    <text x="1108" y="528" text-anchor="middle" font-size="15" font-weight="600" fill="#c6d2e6">2026</text>

    <!-- Coverage stat (verified against repo data) -->
    <text x="600" y="550" text-anchor="middle" font-size="17" font-weight="500" fill="#9fb0cd">130 seasons &#183; 13,328 player files &#183; 16,900+ match records</text>
  </g>

  <!-- ============================================================= -->
  <!-- BAND 2 : Model performance (y 560 to 720)                     -->
  <!-- ============================================================= -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="0" y="560" width="1200" height="160" fill="url(#bandGradAlt)"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#1c2c4d" stroke-opacity="0.6" stroke-width="1"/>

    <!-- Section label -->
    <text x="92" y="600" font-size="13" font-weight="700" fill="#7f8db0" letter-spacing="3">PREDICTION ACCURACY &#8212; 2026 SEASON (R1-R12)</text>

    <!-- Three metric callouts: column centres at 300, 600, 900 -->
    <!-- Left: MAE 4.055 (teal accent) -->
    <text x="300" y="665" text-anchor="middle" font-size="54" font-weight="800" fill="#ffffff">4.055</text>
    <rect x="240" y="678" width="120" height="4" rx="2" fill="#1fb6c9"/>
    <text x="300" y="704" text-anchor="middle" font-size="16" font-weight="500" fill="#9fb0cd">Mean absolute error</text>

    <!-- Centre: 72.8% (gold accent) -->
    <text x="600" y="665" text-anchor="middle" font-size="54" font-weight="800" fill="#ffffff">72.8%</text>
    <rect x="540" y="678" width="120" height="4" rx="2" fill="#FFB300"/>
    <text x="600" y="704" text-anchor="middle" font-size="16" font-weight="500" fill="#9fb0cd">Predictions within 5 disposals</text>

    <!-- Right: 95.7% (green accent) -->
    <text x="900" y="665" text-anchor="middle" font-size="54" font-weight="800" fill="#ffffff">95.7%</text>
    <rect x="840" y="678" width="120" height="4" rx="2" fill="#3ec98a"/>
    <text x="900" y="704" text-anchor="middle" font-size="16" font-weight="500" fill="#9fb0cd">Predictions within 10 disposals</text>
  </g>

  <!-- ============================================================= -->
  <!-- BAND 3 : The council pipeline (y 720 to 900)                  -->
  <!-- ============================================================= -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="0" y="720" width="1200" height="180" fill="url(#bandGrad)"/>
    <line x1="0" y1="720" x2="1200" y2="720" stroke="#1c2c4d" stroke-opacity="0.6" stroke-width="1"/>

    <!-- Section label -->
    <text x="92" y="760" font-size="13" font-weight="700" fill="#7f8db0" letter-spacing="3">THE AI COUNCIL PIPELINE</text>

    <!-- Seven boxes across x=64..1136. Box width 138, gap holds the arrow. -->
    <!-- Box 1: BriefBuilder (64) -->
    <rect x="64"  y="788" width="138" height="64" rx="10" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.45" stroke-width="1"/>
    <text x="133" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">BriefBuilder</text>
    <text x="133" y="838" text-anchor="middle" font-size="11" font-weight="500" fill="#9fb6c9">data skeleton</text>
    <text x="216" y="826" text-anchor="middle" font-size="20" font-weight="700" fill="#5f7392">&#8594;</text>

    <!-- Box 2: Scientist (230) -->
    <rect x="230" y="788" width="138" height="64" rx="10" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.45" stroke-width="1"/>
    <text x="299" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Scientist</text>
    <text x="299" y="838" text-anchor="middle" font-size="11" font-weight="500" fill="#9fb6c9">verified stats</text>
    <text x="382" y="826" text-anchor="middle" font-size="20" font-weight="700" fill="#5f7392">&#8594;</text>

    <!-- Box 3: FootyStrategy (396) -->
    <rect x="396" y="788" width="138" height="64" rx="10" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.45" stroke-width="1"/>
    <text x="465" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">FootyStrategy</text>
    <text x="465" y="838" text-anchor="middle" font-size="11" font-weight="500" fill="#9fb6c9">coaching lens</text>
    <text x="548" y="826" text-anchor="middle" font-size="20" font-weight="700" fill="#5f7392">&#8594;</text>

    <!-- Box 4: DataSentinel (562) verification gate, gold tint -->
    <rect x="562" y="788" width="138" height="64" rx="10" fill="#3a2f12" stroke="#FFB300" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="631" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#ffd87a">DataSentinel</text>
    <text x="631" y="838" text-anchor="middle" font-size="11" font-weight="500" fill="#e0c98a">stamp gate</text>
    <text x="714" y="826" text-anchor="middle" font-size="20" font-weight="700" fill="#5f7392">&#8594;</text>

    <!-- Box 5: Skeptic (728) verification gate, gold tint -->
    <rect x="728" y="788" width="138" height="64" rx="10" fill="#3a2f12" stroke="#FFB300" stroke-opacity="0.55" stroke-width="1.5"/>
    <text x="797" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#ffd87a">Skeptic</text>
    <text x="797" y="838" text-anchor="middle" font-size="11" font-weight="500" fill="#e0c98a">adversarial</text>
    <text x="880" y="826" text-anchor="middle" font-size="20" font-weight="700" fill="#5f7392">&#8594;</text>

    <!-- Box 6: Gaffer (894) -->
    <rect x="894" y="788" width="138" height="64" rx="10" fill="#16314a" stroke="#2f6f8f" stroke-opacity="0.45" stroke-width="1"/>
    <text x="963" y="818" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Gaffer</text>
    <text x="963" y="838" text-anchor="middle" font-size="11" font-weight="500" fill="#9fb6c9">ship decision</text>
    <text x="1046" y="826" text-anchor="middle" font-size="20" font-weight="700" fill="#5f7392">&#8594;</text>

    <!-- Box 7: Published (1060) -->
    <rect x="1060" y="788" width="76" height="64" rx="10" fill="#123a2a" stroke="#3ec98a" stroke-opacity="0.5" stroke-width="1"/>
    <text x="1098" y="818" text-anchor="middle" font-size="14" font-weight="700" fill="#bff0d6">Published</text>
    <text x="1098" y="838" text-anchor="middle" font-size="10" font-weight="500" fill="#8fd6b4">origin/main</text>

    <!-- Gate caption -->
    <text x="64" y="884" font-size="13" font-weight="500" fill="#9fb0cd">Two gold gates &#8212; <tspan fill="#ffd87a" font-weight="700">DataSentinel</tspan> and <tspan fill="#ffd87a" font-weight="700">Skeptic</tspan> &#8212; can halt the ship. No verdict, no publish.</text>
  </g>

  <!-- ============================================================= -->
  <!-- BAND 4 : What this is (y 900 to 1050)                         -->
  <!-- ============================================================= -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <rect x="0" y="900" width="1200" height="150" fill="url(#bandGradAlt)"/>
    <line x1="0" y1="900" x2="1200" y2="900" stroke="#1c2c4d" stroke-opacity="0.6" stroke-width="1"/>

    <!-- Section label -->
    <text x="92" y="940" font-size="13" font-weight="700" fill="#7f8db0" letter-spacing="3">WHAT THIS IS</text>

    <!-- Left column (x=92), Right column (x=620) -->
    <!-- Left row 1 -->
    <text x="92"  y="984" font-size="22" fill="#ffffff">&#127945;</text>
    <text x="132" y="984" font-size="18" font-weight="500" fill="#e6ecf7">130 years of AFL match data (1897&#8211;present)</text>
    <!-- Left row 2 -->
    <text x="92"  y="1022" font-size="22" fill="#ffffff">&#128202;</text>
    <text x="132" y="1022" font-size="18" font-weight="500" fill="#e6ecf7">Machine learning ensemble: LightGBM + HGB + Random Forest</text>

    <!-- Right row 1 -->
    <text x="620" y="984" font-size="22" fill="#ffffff">&#129302;</text>
    <text x="660" y="984" font-size="18" font-weight="500" fill="#e6ecf7">Seven-agent AI council for verified sports journalism</text>
    <!-- Right row 2 -->
    <text x="620" y="1022" font-size="22" fill="#ffffff">&#128240;</text>
    <text x="660" y="1022" font-size="18" font-weight="500" fill="#e6ecf7">Data-grounded commentary &#8212; every number tagged [data]</text>
  </g>

  <!-- Soft separator into the closing space -->
  <line x1="0" y1="1050" x2="1200" y2="1050" stroke="#1c2c4d" stroke-opacity="0.5" stroke-width="1"/>

  <!-- Closing wordmark in the lower breathing room -->
  <text x="600" y="1170" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="18" font-weight="600" fill="#5f7392" letter-spacing="4">SUPERCOACH VIA &#183; AFL &#183; DATA-GROUNDED</text>

  <!-- Bottom footy-gold accent bar (moved to very bottom) -->
  <rect x="0" y="1253" width="1200" height="7" fill="url(#goldBar)"/>
</svg>
