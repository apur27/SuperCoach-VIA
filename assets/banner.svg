  <!-- ── LEFT: AFL oval ── -->
  <g clip-path="url(#mainClip)">
    <!-- Oval glow background -->
    <ellipse cx="175" cy="160" rx="145" ry="108" fill="url(#ovalGlow)"/>
    <!-- Outer oval -->
    <ellipse cx="175" cy="160" rx="140" ry="104" fill="none" stroke="#1e4a8a" stroke-width="1.5" opacity="0.5"/>
    <!-- Inner oval -->
    <ellipse cx="175" cy="160" rx="105" ry="76" fill="none" stroke="#1e4a8a" stroke-width="1" opacity="0.35"/>
    <!-- 50m arcs -->
    <path d="M 60 130 Q 85 80 175 75 Q 265 80 290 130" fill="none" stroke="#1e4a8a" stroke-width="0.8" opacity="0.3"/>
    <path d="M 60 190 Q 85 240 175 245 Q 265 240 290 190" fill="none" stroke="#1e4a8a" stroke-width="0.8" opacity="0.3"/>
    <!-- Centre square -->
    <rect x="155" y="140" width="40" height="40" fill="none" stroke="#2563b0" stroke-width="1" opacity="0.4"/>
    <!-- Centre circle -->
    <circle cx="175" cy="160" r="22" fill="none" stroke="#2e86de" stroke-width="1.5" opacity="0.55" filter="url(#glow)"/>
    <!-- Centre dot -->
    <circle cx="175" cy="160" r="3.5" fill="#2e86de" opacity="0.7" filter="url(#glow)"/>
    <!-- Halfway line -->
    <line x1="175" y1="56" x2="175" y2="264" stroke="#2563b0" stroke-width="0.8" opacity="0.3"/>
    <!-- Goal posts left -->
    <line x1="35" y1="138" x2="35" y2="182" stroke="#3a7bd5" stroke-width="1.5" opacity="0.4"/>
    <line x1="42" y1="145" x2="42" y2="175" stroke="#3a7bd5" stroke-width="1" opacity="0.3"/>
    <!-- Goal posts right -->
    <line x1="315" y1="138" x2="315" y2="182" stroke="#3a7bd5" stroke-width="1.5" opacity="0.4"/>
    <line x1="308" y1="145" x2="308" y2="175" stroke="#3a7bd5" stroke-width="1" opacity="0.3"/>
    <!-- Fade overlay so oval bleeds into centre -->
    <rect x="270" y="0" width="180" height="320" fill="url(#ovalFade)"/>
  </g>

  <!-- ── RIGHT: chart ── -->
  <g clip-path="url(#mainClip)">
    <!-- Fade from right edge -->
    <rect x="820" y="0" width="380" height="320" fill="url(#rightFade)"/>
    <!-- Axis -->
    <line x1="848" y1="258" x2="1170" y2="258" stroke="#ffffff12" stroke-width="1"/>
    <line x1="848" y1="258" x2="848" y2="80" stroke="#ffffff12" stroke-width="1"/>
    <!-- Horizontal rules -->
    <line x1="848" y1="218" x2="1165" y2="218" stroke="#ffffff07" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="848" y1="178" x2="1165" y2="178" stroke="#ffffff07" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="848" y1="138" x2="1165" y2="138" stroke="#ffffff07" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="848" y1="98"  x2="1165" y2="98"  stroke="#ffffff07" stroke-width="1" stroke-dasharray="3,5"/>

    <!-- Bars (8 rounds) -->
    <rect x="858"  y="168" width="22" height="90"  fill="url(#blueBar)"   rx="2" opacity="0.85"/>
    <rect x="893"  y="148" width="22" height="110" fill="url(#purpleBar)" rx="2" opacity="0.85"/>
    <rect x="928"  y="128" width="22" height="130" fill="url(#tealBar)"   rx="2" opacity="0.85"/>
    <rect x="963"  y="155" width="22" height="103" fill="url(#blueBar)"   rx="2" opacity="0.85"/>
    <rect x="998"  y="115" width="22" height="143" fill="url(#purpleBar)" rx="2" opacity="0.85"/>
    <rect x="1033" y="135" width="22" height="123" fill="url(#tealBar)"   rx="2" opacity="0.85"/>
    <rect x="1068" y="105" width="22" height="153" fill="url(#blueBar)"   rx="2" opacity="0.85"/>
    <rect x="1103" y="88"  width="22" height="170" fill="url(#tealBar)"   rx="2" opacity="0.95" filter="url(#glow)"/>

    <!-- Bar top highlights -->
    <rect x="858"  y="168" width="22" height="3" fill="#4a9af5" rx="2" opacity="0.6"/>
    <rect x="893"  y="148" width="22" height="3" fill="#8b7cf8" rx="2" opacity="0.6"/>
    <rect x="928"  y="128" width="22" height="3" fill="#00d4aa" rx="2" opacity="0.6"/>
    <rect x="963"  y="155" width="22" height="3" fill="#4a9af5" rx="2" opacity="0.6"/>
    <rect x="998"  y="115" width="22" height="3" fill="#8b7cf8" rx="2" opacity="0.6"/>
    <rect x="1033" y="135" width="22" height="3" fill="#00d4aa" rx="2" opacity="0.6"/>
    <rect x="1068" y="105" width="22" height="3" fill="#4a9af5" rx="2" opacity="0.6"/>
    <rect x="1103" y="88"  width="22" height="3" fill="#00d4aa" rx="2" opacity="0.9" filter="url(#glow)"/>

    <!-- Smooth trend curve -->
    <path d="M 869 163 C 890 143 910 128 939 123 C 958 120 975 148 1009 110 C 1028 92 1055 128 1079 100 C 1095 82 1110 83 1114 83"
      fill="none" stroke="url(#goldAccent)" stroke-width="2" opacity="0.9" filter="url(#glow)"/>
    <!-- Trend dots -->
    <circle cx="869"  cy="163" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="904"  cy="143" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="939"  cy="123" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="974"  cy="150" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="1009" cy="110" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="1044" cy="130" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="1079" cy="100" r="3" fill="#f5c842" opacity="0.9" filter="url(#glow)"/>
    <circle cx="1114" cy="83"  r="4" fill="#f5c842" opacity="1"   filter="url(#strongGlow)"/>

    <!-- Round labels -->
    <g font-family="monospace" font-size="9" fill="#ffffff30" text-anchor="middle">
      <text x="869"  y="272">R1</text>
      <text x="904"  y="272">R2</text>
      <text x="939"  y="272">R3</text>
      <text x="974"  y="272">R4</text>
      <text x="1009" y="272">R5</text>
      <text x="1044" y="272">R6</text>
      <text x="1079" y="272">R7</text>
