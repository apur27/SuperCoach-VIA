<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#060b18"/>
      <stop offset="60%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8922a"/>
      <stop offset="50%" style="stop-color:#f5c842"/>
      <stop offset="100%" style="stop-color:#e8821a"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0d2a4a"/>
      <stop offset="100%" style="stop-color:#1e6fc4"/>
    </linearGradient>
    <linearGradient id="tealBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0a2a2a"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="ovalFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="70%" style="stop-color:#0a1628;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="ovalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a6b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1e3a6b;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="mainClip">
      <rect width="1200" height="320"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- Ambient center glow -->
  <ellipse cx="600" cy="160" rx="500" ry="200" fill="url(#centerGlow)"/>

  <!-- Fine dot grid -->
  <g fill="#ffffff" opacity="0.04" clip-path="url(#mainClip)">
    <circle cx="50" cy="40" r="1.2"/><circle cx="100" cy="40" r="1.2"/><circle cx="150" cy="40" r="1.2"/>
    <circle cx="200" cy="40" r="1.2"/><circle cx="250" cy="40" r="1.2"/><circle cx="300" cy="40" r="1.2"/>
    <circle cx="350" cy="40" r="1.2"/><circle cx="400" cy="40" r="1.2"/><circle cx="450" cy="40" r="1.2"/>
    <circle cx="500" cy="40" r="1.2"/><circle cx="550" cy="40" r="1.2"/><circle cx="600" cy="40" r="1.2"/>
    <circle cx="650" cy="40" r="1.2"/><circle cx="700" cy="40" r="1.2"/><circle cx="750" cy="40" r="1.2"/>
    <circle cx="800" cy="40" r="1.2"/><circle cx="850" cy="40" r="1.2"/><circle cx="900" cy="40" r="1.2"/>
    <circle cx="950" cy="40" r="1.2"/><circle cx="1000" cy="40" r="1.2"/><circle cx="1050" cy="40" r="1.2"/>
    <circle cx="1100" cy="40" r="1.2"/><circle cx="1150" cy="40" r="1.2"/>
    <circle cx="50" cy="90" r="1.2"/><circle cx="100" cy="90" r="1.2"/><circle cx="150" cy="90" r="1.2"/>
    <circle cx="200" cy="90" r="1.2"/><circle cx="250" cy="90" r="1.2"/><circle cx="300" cy="90" r="1.2"/>
    <circle cx="350" cy="90" r="1.2"/><circle cx="400" cy="90" r="1.2"/><circle cx="450" cy="90" r="1.2"/>
    <circle cx="500" cy="90" r="1.2"/><circle cx="550" cy="90" r="1.2"/><circle cx="600" cy="90" r="1.2"/>
    <circle cx="650" cy="90" r="1.2"/><circle cx="700" cy="90" r="1.2"/><circle cx="750" cy="90" r="1.2"/>
    <circle cx="800" cy="90" r="1.2"/><circle cx="850" cy="90" r="1.2"/><circle cx="900" cy="90" r="1.2"/>
    <circle cx="950" cy="90" r="1.2"/><circle cx="1000" cy="90" r="1.2"/><circle cx="1050" cy="90" r="1.2"/>
    <circle cx="1100" cy="90" r="1.2"/><circle cx="1150" cy="90" r="1.2"/>
    <circle cx="50" cy="140" r="1.2"/><circle cx="100" cy="140" r="1.2"/><circle cx="150" cy="140" r="1.2"/>
    <circle cx="200" cy="140" r="1.2"/><circle cx="250" cy="140" r="1.2"/><circle cx="300" cy="140" r="1.2"/>
    <circle cx="350" cy="140" r="1.2"/><circle cx="400" cy="140" r="1.2"/><circle cx="450" cy="140" r="1.2"/>
    <circle cx="500" cy="140" r="1.2"/><circle cx="550" cy="140" r="1.2"/><circle cx="600" cy="140" r="1.2"/>
    <circle cx="650" cy="140" r="1.2"/><circle cx="700" cy="140" r="1.2"/><circle cx="750" cy="140" r="1.2"/>
    <circle cx="800" cy="140" r="1.2"/><circle cx="850" cy="140" r="1.2"/><circle cx="900" cy="140" r="1.2"/>
    <circle cx="950" cy="140" r="1.2"/><circle cx="1000" cy="140" r="1.2"/><circle cx="1050" cy="140" r="1.2"/>
    <circle cx="1100" cy="140" r="1.2"/><circle cx="1150" cy="140" r="1.2"/>
    <circle cx="50" cy="190" r="1.2"/><circle cx="100" cy="190" r="1.2"/><circle cx="150" cy="190" r="1.2"/>
    <circle cx="200" cy="190" r="1.2"/><circle cx="250" cy="190" r="1.2"/><circle cx="300" cy="190" r="1.2"/>
    <circle cx="350" cy="190" r="1.2"/><circle cx="400" cy="190" r="1.2"/><circle cx="450" cy="190" r="1.2"/>
    <circle cx="500" cy="190" r="1.2"/><circle cx="550" cy="190" r="1.2"/><circle cx="600" cy="190" r="1.2"/>
    <circle cx="650" cy="190" r="1.2"/><circle cx="700" cy="190" r="1.2"/><circle cx="750" cy="190" r="1.2"/>
    <circle cx="800" cy="190" r="1.2"/><circle cx="850" cy="190" r="1.2"/><circle cx="900" cy="190" r="1.2"/>
    <circle cx="950" cy="190" r="1.2"/><circle cx="1000" cy="190" r="1.2"/><circle cx="1050" cy="190" r="1.2"/>
    <circle cx="1100" cy="190" r="1.2"/><circle cx="1150" cy="190" r="1.2"/>
    <circle cx="50" cy="240" r="1.2"/><circle cx="100" cy="240" r="1.2"/><circle cx="150" cy="240" r="1.2"/>
    <circle cx="200" cy="240" r="1.2"/><circle cx="250" cy="240" r="1.2"/><circle cx="300" cy="240" r="1.2"/>
    <circle cx="350" cy="240" r="1.2"/><circle cx="400" cy="240" r="1.2"/><circle cx="450" cy="240" r="1.2"/>
    <circle cx="500" cy="240" r="1.2"/><circle cx="550" cy="240" r="1.2"/><circle cx="600" cy="240" r="1.2"/>
    <circle cx="650" cy="240" r="1.2"/><circle cx="700" cy="240" r="1.2"/><circle cx="750" cy="240" r="1.2"/>
    <circle cx="800" cy="240" r="1.2"/><circle cx="850" cy="240" r="1.2"/><circle cx="900" cy="240" r="1.2"/>
    <circle cx="950" cy="240" r="1.2"/><circle cx="1000" cy="240" r="1.2"/><circle cx="1050" cy="240" r="1.2"/>
    <circle cx="1100" cy="240" r="1.2"/><circle cx="1150" cy="240" r="1.2"/>
    <circle cx="50" cy="290" r="1.2"/><circle cx="100" cy="290" r="1.2"/><circle cx="150" cy="290" r="1.2"/>
    <circle cx="200" cy="290" r="1.2"/><circle cx="250" cy="290" r="1.2"/><circle cx="300" cy="290" r="1.2"/>
    <circle cx="350" cy="290" r="1.2"/><circle cx="400" cy="290" r="1.2"/><circle cx="450" cy="290" r="1.2"/>
    <circle cx="500" cy="290" r="1.2"/><circle cx="550" cy="290" r="1.2"/><circle cx="600" cy="290" r="1.2"/>
