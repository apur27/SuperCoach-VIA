<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#e8471a"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="100%" style="stop-color:#2e86de"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3a6b"/>
      <stop offset="100%" style="stop-color:#54a0ff"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2a4a2a"/>
      <stop offset="100%" style="stop-color:#2ed573"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff08" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- AFL oval shape (left side, background element) -->
  <ellipse cx="160" cy="150" rx="130" ry="95" fill="none" stroke="#1a3a6b" stroke-width="2" opacity="0.6"/>
  <ellipse cx="160" cy="150" rx="100" ry="70" fill="none" stroke="#1a3a6b" stroke-width="1" opacity="0.4"/>
  <!-- Centre circle -->
  <circle cx="160" cy="150" r="25" fill="none" stroke="#2e86de" stroke-width="1.5" opacity="0.5"/>
  <!-- Goal squares -->
  <rect x="35" y="125" width="20" height="50" fill="none" stroke="#2e86de" stroke-width="1" opacity="0.4"/>
  <rect x="255" y="125" width="20" height="50" fill="none" stroke="#2e86de" stroke-width="1" opacity="0.4"/>
  <!-- Centre line -->
  <line x1="160" y1="55" x2="160" y2="245" stroke="#2e86de" stroke-width="1" opacity="0.3"/>

  <!-- Bar chart (right side) -->
  <!-- Chart base line -->
  <line x1="840" y1="240" x2="1150" y2="240" stroke="#ffffff20" stroke-width="1"/>

  <!-- Bars — disposals by round -->
  <rect x="855" y="150" width="28" height="90" fill="url(#bar1)" rx="3"/>
  <rect x="895" y="130" width="28" height="110" fill="url(#bar2)" rx="3"/>
  <rect x="935" y="110" width="28" height="130" fill="url(#bar3)" rx="3"/>
  <rect x="975" y="140" width="28" height="100" fill="url(#bar1)" rx="3"/>
  <rect x="1015" y="100" width="28" height="140" fill="url(#bar2)" rx="3"/>
  <rect x="1055" y="120" width="28" height="120" fill="url(#bar3)" rx="3"/>
  <rect x="1095" y="95" width="28" height="145" fill="url(#bar2)" rx="3" filter="url(#glow)"/>

  <!-- Trend line over bars -->
  <polyline points="869,145 909,125 949,105 989,135 1029,95 1069,115 1109,90"
    fill="none" stroke="#f5a623" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
  <!-- Trend line dots -->
  <circle cx="869" cy="145" r="3.5" fill="#f5a623" opacity="0.9"/>
  <circle cx="909" cy="125" r="3.5" fill="#f5a623" opacity="0.9"/>
  <circle cx="949" cy="105" r="3.5" fill="#f5a623" opacity="0.9"/>
  <circle cx="989" cy="135" r="3.5" fill="#f5a623" opacity="0.9"/>
  <circle cx="1029" cy="95" r="3.5" fill="#f5a623" opacity="0.9"/>
  <circle cx="1069" cy="115" r="3.5" fill="#f5a623" opacity="0.9"/>
  <circle cx="1109" cy="90" r="3.5" fill="#f5a623" filter="url(#glow)" opacity="0.9"/>

  <!-- Chart label -->
  <text x="997" y="270" font-family="monospace" font-size="11" fill="#ffffff40" text-anchor="middle">disposals by round</text>

  <!-- Accent line under title -->
  <rect x="310" y="108" width="220" height="3" fill="url(#accent)" rx="2"/>

  <!-- Main title -->
  <text x="420" y="100" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="1" filter="url(#softglow)">AFL SuperCoach VIA</text>

  <!-- Subtitle -->
  <text x="420" y="145" font-family="Arial, sans-serif" font-size="16" fill="#a0b8d8" text-anchor="middle" letter-spacing="2">
    DATA · PREDICTIONS · ALL-TIME RANKINGS
  </text>

  <!-- Stats row -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <!-- Stat 1 -->
    <text x="310" y="195" font-size="28" font-weight="bold" fill="#f5a623" filter="url(#glow)">5,700+</text>
    <text x="310" y="215" font-size="11" fill="#7090b0" letter-spacing="1">PLAYERS</text>

    <!-- Divider -->
    <line x1="390" y1="178" x2="390" y2="220" stroke="#ffffff15" stroke-width="1"/>

    <!-- Stat 2 -->
    <text x="420" y="195" font-size="28" font-weight="bold" fill="#2ed573" filter="url(#glow)">125</text>
    <text x="420" y="215" font-size="11" fill="#7090b0" letter-spacing="1">YEARS OF DATA</text>

    <!-- Divider -->
    <line x1="490" y1="178" x2="490" y2="220" stroke="#ffffff15" stroke-width="1"/>

    <!-- Stat 3 -->
    <text x="530" y="195" font-size="28" font-weight="bold" fill="#54a0ff" filter="url(#glow)">94%</text>
    <text x="530" y="215" font-size="11" fill="#7090b0" letter-spacing="1">WITHIN 10</text>
  </g>

  <!-- Bottom tag line -->
  <text x="420" y="260" font-family="monospace" font-size="12" fill="#ffffff35" text-anchor="middle">
    Built with Claude Code · Scientist Agent · LightGBM GPU
  </text>

  <!-- Decorative corner dots -->
  <circle cx="20" cy="20" r="3" fill="#2e86de" opacity="0.4"/>
  <circle cx="35" cy="20" r="2" fill="#2e86de" opacity="0.3"/>
  <circle cx="20" cy="35" r="2" fill="#2e86de" opacity="0.3"/>

  <circle cx="1180" cy="280" r="3" fill="#f5a623" opacity="0.4"/>
  <circle cx="1165" cy="280" r="2" fill="#f5a623" opacity="0.3"/>
  <circle cx="1180" cy="265" r="2" fill="#f5a623" opacity="0.3"/>
</svg>
