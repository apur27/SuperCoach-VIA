  <!-- ── CENTRE: text ── -->

  <!-- Eyebrow label -->
  <text x="600" y="82" font-family="'Courier New', monospace" font-size="10.5" fill="#f5c842"
    text-anchor="middle" letter-spacing="4" opacity="0.85">AFL · DATA SCIENCE · AI AGENTS</text>

  <!-- Main title -->
  <text x="600" y="148" font-family="Arial Black, 'Arial Bold', sans-serif" font-size="48" font-weight="900"
    fill="white" text-anchor="middle" letter-spacing="0" filter="url(#subtleGlow)" opacity="0.97">AFL SuperCoach VIA</text>

  <!-- Gold underline -->
  <rect x="350" y="158" width="500" height="2.5" fill="url(#goldAccent)" rx="1.5" opacity="0.9"/>

  <!-- Subtitle -->
  <text x="600" y="190" font-family="Arial, sans-serif" font-size="13.5" fill="#7eadd4"
    text-anchor="middle" letter-spacing="3.5" font-weight="300">PREDICTIONS  ·  RANKINGS  ·  COACHING ANALYTICS</text>

  <!-- Stats row -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <!-- Dividers -->
    <line x1="460" y1="210" x2="460" y2="252" stroke="#ffffff12" stroke-width="1"/>
    <line x1="600" y1="210" x2="600" y2="252" stroke="#ffffff12" stroke-width="1"/>
    <line x1="740" y1="210" x2="740" y2="252" stroke="#ffffff12" stroke-width="1"/>

    <!-- Stat 1 -->
    <text x="400" y="238" font-size="30" font-weight="700" fill="#1e90ff" filter="url(#glow)" letter-spacing="-1">5,700<tspan font-size="18" dy="-4">+</tspan></text>
    <text x="400" y="254" font-size="9.5" fill="#4a7090" letter-spacing="2.5">PLAYERS</text>

    <!-- Stat 2 -->
    <text x="530" y="238" font-size="30" font-weight="700" fill="#f5c842" filter="url(#glow)" letter-spacing="-1">125</text>
    <text x="530" y="254" font-size="9.5" fill="#4a7090" letter-spacing="2.5">YRS OF DATA</text>

    <!-- Stat 3 -->
    <text x="670" y="238" font-size="30" font-weight="700" fill="#00d4aa" filter="url(#glow)" letter-spacing="-1">94<tspan font-size="18" dy="-4">%</tspan></text>
    <text x="670" y="254" font-size="9.5" fill="#4a7090" letter-spacing="2.5">WITHIN 10</text>

    <!-- Stat 4 -->
    <text x="800" y="238" font-size="30" font-weight="700" fill="#a78bfa" filter="url(#glow)" letter-spacing="-1">4.1</text>
    <text x="800" y="254" font-size="9.5" fill="#4a7090" letter-spacing="2.5">AVG ERROR</text>
  </g>

  <!-- Bottom built-with line -->
  <text x="600" y="294" font-family="'Courier New', monospace" font-size="10" fill="#ffffff18"
    text-anchor="middle" letter-spacing="2">Built with Claude Code · Scientist Agent (Opus) · LightGBM GPU · 1897–2026</text>

  <!-- Corner accents -->
  <rect x="0" y="0" width="3" height="60" fill="url(#goldAccent)" opacity="0.6"/>
  <rect x="0" y="0" width="60" height="3" fill="url(#goldAccent)" opacity="0.6"/>
  <rect x="1197" y="0" width="3" height="60" fill="url(#goldAccent)" opacity="0.6"/>
  <rect x="1140" y="0" width="60" height="3" fill="url(#goldAccent)" opacity="0.6"/>
  <rect x="0" y="317" width="60" height="3" fill="url(#goldAccent)" opacity="0.3"/>
  <rect x="1140" y="317" width="60" height="3" fill="url(#goldAccent)" opacity="0.3"/>
