name: Feature request
description: Suggest a new feature, stat category, model improvement, or doc page
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share an idea! This form is friendly to footy fans, SuperCoach players, and developers alike. Skip any field you don't have an answer for.

  - type: dropdown
    id: who-are-you
    attributes:
      label: Who are you?
      description: Helps us tune the answer.
      options:
        - Footy fan / SuperCoach player (no coding needed)
        - Power user (I can use spreadsheets / read CSVs)
        - Developer / data scientist
        - Coach / analyst at a club
        - Prefer not to say
    validations:
      required: false

  - type: textarea
    id: what
    attributes:
      label: What would you like to see?
      description: Plain English is fine. Examples - "predict tackles, not just disposals", "add a goal-kicker leaderboard", "weekly cheat sheet PDF".
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why does it matter to you?
      description: What problem does this solve or what question does it answer?
      placeholder: This would help me because...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Have you tried anything already?
      description: e.g. "I currently look this up on AFL Tables and copy it manually". Helps us understand the gap.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have - take your time
        - Would actually use it weekly
        - Blocking me from getting value out of this repo
    validations:
      required: false

  - type: checkboxes
    id: code-of-conduct
    attributes:
      label: Friendly note
      description: Just a check that you've had a quick look around.
      options:
        - label: I have skimmed the existing issues to make sure this is not a duplicate.
          required: false
